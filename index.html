<!DOCTYPE html>
<html>
<head>
  <title>Cost of Living Calculator</title>

  <style>
    body {
      font-family: Arial;
      max-width: 650px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 15px;
    }

    select, input, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    .result-box {
      margin-top: 20px;
      padding: 15px;
      background: #f4f4f4;
    }
  </style>
</head>

<body>

<h1>Cost of Living Calculator</h1>

<p><i>All values are estimated weekly averages based on Sydney living costs.</i></p>

<!-- ================= RENT SECTION ================= -->

<!-- User selects accommodation type -->
<label>Accommodation Type</label>
<select id="rentType">
  <option value="none">Skip</option>
  <option value="home">Single / Family Home</option>
  <option value="granny">Granny Flat</option>
  <option value="apartment">Apartment</option>
</select>

<!-- User manually enters rent cost -->
<label>Enter your weekly rent ($)</label>
<input type="number" id="rentInput" placeholder="e.g. 500">

<!-- ================= TRANSPORT SECTION ================= -->

<h3>Transport Usage</h3>

<!-- Bicycle usage cost estimate -->
<label>Bicycle</label>
<select id="bike">
  <option value="0">Never</option>
  <option value="5">Sometimes</option>
  <option value="10">Often</option>
</select>

<!-- Public transport usage -->
<label>Public Transport</label>
<select id="publicTransport">
  <option value="0">Never</option>
  <option value="20">Sometimes</option>
  <option value="50">Often</option>
</select>

<!-- Car usage cost -->
<label>Car</label>
<select id="car">
  <option value="0">Never</option>
  <option value="80">Sometimes</option>
  <option value="200">Often</option>
</select>

<!-- Uber / taxi usage -->
<label>Taxi / Uber</label>
<select id="uber">
  <option value="0">Never</option>
  <option value="40">Sometimes</option>
  <option value="120">Often</option>
</select>

<!-- ================= FOOD SECTION ================= -->

<h3>Food (Meals per week)</h3>

<!-- Each meal input is limited to 0–7 days per week -->

<label>Breakfast</label>
<input type="number" id="breakfast" min="0" max="7" value="0" oninput="clampMeals(this)">

<label>Lunch</label>
<input type="number" id="lunch" min="0" max="7" value="0" oninput="clampMeals(this)">

<label>Dinner</label>
<input type="number" id="dinner" min="0" max="7" value="0" oninput="clampMeals(this)">

<!-- Meal cost category (cheap/moderate/expensive) -->
<label>Meal Price Level</label>
<select id="foodPrice">
  <option value="15">Cheap ($15)</option>
  <option value="35">Moderate ($35)</option>
  <option value="60">Expensive ($60)</option>
</select>

<!-- ================= LIFESTYLE SECTION ================= -->

<h3>Lifestyle Spending</h3>

<!-- Optional discretionary spending categories -->

<label>Shopping</label>
<select id="shop">
  <option value="0">Never</option>
  <option value="50">Sometimes</option>
  <option value="200">Often</option>
</select>

<label>Cinema</label>
<select id="cinema">
  <option value="0">Never</option>
  <option value="25">Sometimes</option>
  <option value="60">Often</option>
</select>

<label>Fitness Classes</label>
<select id="fitness">
  <option value="0">Never</option>
  <option value="25">Sometimes</option>
  <option value="70">Often</option>
</select>

<label>Personal Care (Hair, Nails, etc.)</label>
<select id="care">
  <option value="0">Never</option>
  <option value="25">Sometimes</option>
  <option value="70">Often</option>
</select>

<!-- Button triggers calculation function -->
<button onclick="calculate()">Calculate Weekly Cost</button>

<!-- Output area for results -->
<div class="result-box" id="result"></div>

<script>

/* ================= REFERENCE DATA ================= */

/*
  These are baseline ranges used for comparison.
  They represent estimated weekly costs in Sydney.
*/
const rentRanges = {
  home: { min: 570, max: 810 },
  granny: { min: 480, max: 620 },
  apartment: { min: 600, max: 730 }
};

/*
  Benchmarks represent "healthy spending limits"
  used for generating feedback messages.
*/
const benchmarks = {
  transport: 100,
  food: 150,
  lifestyle: 120
};

/* ================= MEAL INPUT VALIDATION ================= */

/*
  Ensures meal inputs stay between 0 and 7
  (since there are 7 days in a week)
*/
function clampMeals(el) {
  let value = Number(el.value);

  if (value > 7) el.value = 7;  // prevents unrealistic input
  if (value < 0) el.value = 0;   // prevents negative values
}

/* ================= MAIN CALCULATION FUNCTION ================= */

function calculate() {

  // ===== RENT CALCULATION =====
  let rentType = document.getElementById("rentType").value;

  // Convert rent input to number; default to 0 if empty
  let rent = Number(document.getElementById("rentInput").value) || 0;

  let rentFeedback = "";

  /*
    If user selected a rent type and entered a value,
    compare it to expected Sydney ranges.
  */
  if (rentType !== "none" && rent > 0) {
    let range = rentRanges[rentType];

    if (rent > range.max) {
      rentFeedback = "🏠 Your rent is above the expected range.<br>";
    } else if (rent < range.min) {
      rentFeedback = "🏠 Your rent is below the expected range.<br>";
    } else {
      rentFeedback = "🏠 Your rent is within the expected range.<br>";
    }
  }

  // ===== TRANSPORT CALCULATION =====
  /*
    Adds all transport-related costs based on frequency selection
  */
  let transportTotal =
    Number(document.getElementById("bike").value) +
    Number(document.getElementById("publicTransport").value) +
    Number(document.getElementById("car").value) +
    Number(document.getElementById("uber").value);

  // ===== FOOD CALCULATION =====
  /*
    Total meals per week × cost per meal
  */
  let foodTotal =
    (Number(document.getElementById("breakfast").value) +
     Number(document.getElementById("lunch").value) +
     Number(document.getElementById("dinner").value)) *
    Number(document.getElementById("foodPrice").value);

  // ===== LIFESTYLE CALCULATION =====
  /*
    Adds discretionary spending categories together
  */
  let lifestyleTotal =
    Number(document.getElementById("shop").value) +
    Number(document.getElementById("cinema").value) +
    Number(document.getElementById("fitness").value) +
    Number(document.getElementById("care").value);

  // ===== FINAL TOTAL COST =====
  let total = rent + transportTotal + foodTotal + lifestyleTotal;

  // ===== FEEDBACK GENERATION =====
  let feedback = "";

  /*
    Compare spending against benchmarks and generate advice
  */
  if (transportTotal > benchmarks.transport) {
    feedback += "🚗 Transport spending is high. Consider public transport more often.<br>";
  }

  if (foodTotal > benchmarks.food) {
    feedback += "🍔 Food spending is high. Cooking at home could save money.<br>";
  }

  if (lifestyleTotal > benchmarks.lifestyle) {
    feedback += "🎬 Lifestyle spending is high. Reduce non-essential activities.<br>";
  }

  /*
    Overall warning if spending exceeds threshold
  */
  if (total > 1000) {
    feedback += "<strong>⚠️ Total weekly cost is high compared to average.</strong><br>";
  }

  /*
    If no issues found, show positive message
  */
  if (!feedback) {
    feedback = "✅ Your spending is within a reasonable range.";
  }

  // ===== DISPLAY OUTPUT =====
  document.getElementById("result").innerHTML = `
    <h2>Total Weekly Cost: $${total}</h2>

    <p><strong>Rent Analysis:</strong><br>${rentFeedback}</p>

    <p><strong>Suggestions:</strong><br>${feedback}</p>
  `;
}

</script>

</body>
</html>
