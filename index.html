<!DOCTYPE html>
<html>
<head>
  <title>Cost of Living Calculator</title>

  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 15px;
    }

    select, input, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    .result-box {
      margin-top: 20px;
      padding: 15px;
      background: #f4f4f4;
    }
  </style>
</head>

<body>

<h1>Cost of Living Calculator</h1>

<p><i>All values are estimated weekly averages based on Sydney living costs.</i></p>

<!-- ================= ACCOMMODATION ================= -->

<label>What type of accommodation are you renting? (optional)</label>
<select id="rentType">
  <option value="none">Skip</option>
  <option value="900">Single, Family Home</option>
  <option value="500">Granny Flat</option>
  <option value="700">Town House</option>
  <option value="700">Apartment</option>
</select>

<label>Enter your weekly rent ($)</label>
<input type="number" id="rentInput" placeholder="e.g. 500">

<!-- ================= TRANSPORT ================= -->

<h3>What kinds of transport do you use and how often?</h3>

<label>Bicycle</label>
<select id="bike">
  <option value="0">Never</option>
  <option value="5">Sometimes</option>
  <option value="10">Often</option>
</select>

<label>Public Transport</label>
<select id="public">
  <option value="0">Never</option>
  <option value="20">Sometimes</option>
  <option value="50">Often</option>
</select>

<label>Car</label>
<select id="car">
  <option value="0">Never</option>
  <option value="80">Sometimes</option>
  <option value="200">Often</option>
</select>

<label>Taxi / Uber</label>
<select id="uber">
  <option value="0">Never</option>
  <option value="40">Sometimes</option>
  <option value="120">Often</option>
</select>

<!-- ================= FOOD ================= -->

<h3>Eating Out</h3>

<label>How often do you purchase breakfast per week?</label>
<input type="number" id="breakfast" min="0" max="7" value="0">

<label>How often do you purchase lunch per week?</label>
<input type="number" id="lunch" min="0" max="7" value="0">

<label>How often do you purchase dinner per week?</label>
<input type="number" id="dinner" min="0" max="7" value="0">

<label>How much does each meal cost on average?</label>
<select id="foodPrice">
  <option value="15">Cheap ($15)</option>
  <option value="35">Moderate ($30)</option>
  <option value="60">Expensive ($60)</option>
</select>

<!-- ================= LIFESTYLE ================= -->

<h3>How often do you undertake these lifestyle activities?</h3>

<label>Shopping</label>
<select id="shop">
  <option value="0">Never</option>
  <option value="50">Sometimes</option>
  <option value="200">Often</option>
</select>

<label>Cinema</label>
<select id="cinema">
  <option value="0">Never</option>
  <option value="25">Sometimes</option>
  <option value="60">Often</option>
</select>

<label>Fitness Classes</label>
<select id="fitness">
  <option value="0">Never</option>
  <option value="25">Sometimes</option>
  <option value="70">Often</option>
</select>

<label>Personal Care (Hair, Nails, etc.)</label>
<select id="care">
  <option value="0">Never</option>
  <option value="25">Sometimes</option>
  <option value="70">Often</option>
</select>

<button onclick="calculate()">Calculate Weekly Cost</button>

<div class="result-box" id="result"></div>

<script>
function calculate() {

  // ================= RENT =================
  let rentBenchmark = document.getElementById("rentType").value;
  let rent = Number(document.getElementById("rentInput").value) || 0;

  let rentFeedback = "";

  if (rentBenchmark !== "none" && rent > 0) {
    rentBenchmark = Number(rentBenchmark);

    if (rent > rentBenchmark) {
      rentFeedback = "🏠 Your rent is above average for this housing type.<br>";
    } else if (rent < rentBenchmark) {
      rentFeedback = "🏠 Your rent is below average for this housing type.<br>";
    } else {
      rentFeedback = "🏠 Your rent matches the average.<br>";
    }
  }

  // ================= TRANSPORT =================
  let bike = Number(document.getElementById("bike").value);
  let publicT = Number(document.getElementById("public").value);
  let car = Number(document.getElementById("car").value);
  let uber = Number(document.getElementById("uber").value);

  let transportTotal = bike + publicT + car + uber;

  // ================= FOOD =================
  let breakfast = Number(document.getElementById("breakfast").value) || 0;
  let lunch = Number(document.getElementById("lunch").value) || 0;
  let dinner = Number(document.getElementById("dinner").value) || 0;
  let foodPrice = Number(document.getElementById("foodPrice").value);

  let foodTotal = (breakfast + lunch + dinner) * foodPrice;

  // ================= LIFESTYLE =================
  let shop = Number(document.getElementById("shop").value);
  let cinema = Number(document.getElementById("cinema").value);
  let fitness = Number(document.getElementById("fitness").value);
  let care = Number(document.getElementById("care").value);

  let lifestyleTotal = shop + cinema + fitness + care;

  // ================= TOTAL =================
  let total = rent + transportTotal + foodTotal + lifestyleTotal;

  // ================= BENCHMARKS =================
  const benchmarks = {
    transport: 100,
    food: 150,
    lifestyle: 120
  };

  let feedback = "";

  // ================= CHECKS =================
  if (transportTotal > benchmarks.transport) {
    feedback += "🚗 Your transport costs are high. Consider using public transport more often.<br>";
  }

  if (foodTotal > benchmarks.food) {
    feedback += "🍔 You spend a lot on eating out. Try cooking more meals at home.<br>";
  }

  if (lifestyleTotal > benchmarks.lifestyle) {
    feedback += "🎬 Lifestyle spending is high. Reducing non-essential activities could help.<br>";
  }

  if (total > 1000) {
    feedback += "<strong>⚠️ Your total spending is quite high compared to average.</strong><br>";
  }

  // ================= OUTPUT =================
  document.getElementById("result").innerHTML = `
    <h2>Total Weekly Cost: $${total}</h2>

    <p><strong>Rent Feedback:</strong><br>${rentFeedback}</p>

    <p><strong>Suggestions:</strong><br>
      ${feedback || "✅ Your spending is within a reasonable range."}
    </p>
  `;
}
</script>

</body>
</html>
